<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meal Suggester</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f7f4; color: #1a1a18; min-height: 100vh; }
    .page-shell { position: relative; min-height: 100vh; overflow-x: hidden; }
    .cuisine-background {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.95;
      filter: saturate(1.35) contrast(1.12) brightness(0.92);
      transform: scale(1.06);
      transition: background-image 0.35s ease, opacity 0.35s ease, filter 0.35s ease;
    }
    .cuisine-background::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(248,247,244,0.06) 0%, rgba(248,247,244,0.35) 40%, rgba(248,247,244,0.82) 100%);
    }
    .cuisine-badge {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 2;
      background: rgba(255,255,255,0.98);
      color: var(--accent-text);
      border: 1px solid rgba(59,109,17,0.24);
      border-radius: 999px;
      padding: 0.65rem 1rem;
      font-size: 1rem;
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(0,0,0,0.16);
      pointer-events: none;
      animation: badge-pop 0.25s ease;
    }
    @keyframes badge-pop {
      0% { transform: scale(0.95); opacity: 0.6; }
      100% { transform: scale(1); opacity: 1; }
    }
    :root {
      --surface-0: #f8f7f4;
      --surface-1: #f1efea;
      --surface-2: #ffffff;
      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-muted: #888780;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.14);
      --accent: #3b6d11;
      --accent-bg: #eaf3de;
      --accent-text: #3b6d11;
      --accent-border: #c0dd97;
      --danger: #a32d2d;
      --danger-bg: #fcebeb;
      --danger-border: #f7c1c1;
      --warning-bg: #faeeda;
      --warning-text: #854f0b;
      --warning-border: #fac775;
      --radius: 8px;
    }

    .app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* Header */
    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 { font-size: 28px; font-weight: 500; color: var(--text-primary); margin-bottom: 6px; }
    .header p { color: var(--text-secondary); font-size: 15px; }

    /* API key */
    .api-key-section { background: rgba(250,238,218,0.95); border: 0.5px solid var(--warning-border); border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 12px; }
    .api-key-section input { flex: 1; border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 8px 12px; font-size: 14px; background: #fff; color: var(--text-primary); outline: none; font-family: monospace; }
    .api-key-section input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,109,17,0.1); }
    .api-key-label { font-size: 13px; color: var(--warning-text); font-weight: 500; white-space: nowrap; }

    /* Cards */
    .card { background: rgba(255,255,255,0.9); backdrop-filter: blur(6px); border: 0.5px solid var(--border-strong); border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: 15px; font-weight: 500; color: var(--text-primary); margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
    .card-title i { font-size: 18px; color: var(--accent-text); }

    /* Ingredient input */
    .tag-input-row { display: flex; align-items: flex-start; gap: 8px; }
    .tags-container { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px; border: 0.5px solid var(--border-strong); border-radius: var(--radius); background: var(--surface-0); min-height: 44px; cursor: text; flex: 1; }
    .tags-container:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,109,17,0.1); }
    .voice-btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 12px; border: 0.5px solid var(--border-strong); border-radius: var(--radius); background: var(--surface-2); color: var(--text-secondary); cursor: pointer; font-family: inherit; font-size: 13px; white-space: nowrap; }
    .voice-btn:hover { background: var(--surface-1); }
    .voice-btn.listening { background: var(--danger-bg); color: var(--danger); border-color: var(--danger-border); }
    .tag { display: inline-flex; align-items: center; gap: 5px; background: var(--accent-bg); color: var(--accent-text); border: 0.5px solid var(--accent-border); border-radius: 6px; padding: 3px 8px; font-size: 13px; font-weight: 500; }
    .tag-remove { cursor: pointer; font-size: 16px; line-height: 1; opacity: 0.6; }
    .tag-remove:hover { opacity: 1; }
    .tag-input { border: none; outline: none; background: transparent; font-size: 14px; color: var(--text-primary); min-width: 120px; flex: 1; padding: 2px 4px; }
    .tag-hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

    /* Cuisine grid */
    .cuisine-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .cuisine-btn { padding: 7px 14px; border: 0.5px solid var(--border-strong); border-radius: var(--radius); background: var(--surface-0); color: var(--text-secondary); font-size: 13px; cursor: pointer; transition: all 0.12s; font-family: inherit; }
    .cuisine-btn:hover { border-color: var(--accent-border); background: var(--accent-bg); color: var(--accent-text); }
    .cuisine-btn.selected { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-text); font-weight: 500; }

    /* Servings */
    .servings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
    .serving-item { display: flex; flex-direction: column; gap: 6px; }
    .serving-label { font-size: 13px; color: var(--text-secondary); }
    .serving-row { display: flex; align-items: center; gap: 8px; }
    .count-btn { width: 28px; height: 28px; border: 0.5px solid var(--border-strong); border-radius: 6px; background: var(--surface-0); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--text-primary); font-family: inherit; transition: background 0.1s; }
    .count-btn:hover { background: var(--surface-1); }
    .count-display { font-size: 16px; font-weight: 500; min-width: 20px; text-align: center; }
    .leftovers-toggle { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    .toggle { width: 40px; height: 22px; background: var(--border-strong); border-radius: 11px; cursor: pointer; position: relative; transition: background 0.2s; border: none; }
    .toggle.on { background: var(--accent); }
    .toggle-thumb { width: 18px; height: 18px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: left 0.2s; }
    .toggle.on .toggle-thumb { left: 20px; }
    .leftover-inputs { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding: 10px; background: var(--surface-0); border-radius: var(--radius); }

    /* Generate button */
    .generate-btn { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 500; cursor: pointer; font-family: inherit; transition: background 0.15s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .generate-btn:hover:not(:disabled) { background: #2d5509; }
    .generate-btn:active:not(:disabled) { transform: scale(0.98); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Loading */
    .loading { text-align: center; padding: 3rem; color: var(--text-secondary); }
    .spinner { width: 32px; height: 32px; border: 2px solid var(--border-strong); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Mismatch banner */
    .mismatch-banner { background: var(--warning-bg); border: 0.5px solid var(--warning-border); border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .mismatch-banner .banner-title { font-weight: 500; color: var(--warning-text); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .mismatch-banner p { font-size: 14px; color: var(--warning-text); }

    /* Meal cards */
    .meals-grid { display: flex; flex-direction: column; gap: 1.5rem; }
    .meal-card { background: var(--surface-2); border: 0.5px solid var(--border-strong); border-radius: 16px; overflow: hidden; }
    .meal-header { padding: 1.25rem 1.5rem 1rem; border-bottom: 0.5px solid var(--border); }
    .meal-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
    .meal-name { font-size: 20px; font-weight: 500; color: var(--text-primary); }
    .cuisine-badge { background: var(--accent-bg); color: var(--accent-text); border: 0.5px solid var(--accent-border); border-radius: 6px; padding: 3px 10px; font-size: 12px; font-weight: 500; white-space: nowrap; }
    .meal-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
    .meal-body { padding: 1.25rem 1.5rem; }
    .detail-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
    .detail-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 999px; background: var(--surface-1); color: var(--text-secondary); font-size: 12px; font-weight: 500; }
    .recipe-section { margin-bottom: 1rem; }
    .recipe-section .section-label { margin-bottom: 8px; }
    .ingredient-list, .step-list { display: flex; flex-direction: column; gap: 8px; padding-left: 1rem; color: var(--text-secondary); font-size: 14px; line-height: 1.5; }
    .step-list li::marker { color: var(--accent-text); }
    .ingredient-list li::marker { color: var(--accent-text); }
    .filters-bar { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 1rem; align-items: center; }
    .filter-group { display: flex; flex-direction: column; gap: 6px; min-width: 150px; }
    .filter-group label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .filter-group select { border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 8px 10px; font-size: 13px; background: var(--surface-2); color: var(--text-primary); font-family: inherit; }
    .filter-summary { font-size: 13px; color: var(--text-secondary); margin-bottom: 1rem; }
    .empty-state { padding: 1rem; border: 0.5px dashed var(--border-strong); border-radius: var(--radius); background: rgba(255,255,255,0.6); color: var(--text-secondary); }

    /* Nutrition */
    .section-label { font-size: 13px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    .nutrition-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; margin-bottom: 1.25rem; }
    .nut-card { background: var(--surface-1); border-radius: var(--radius); padding: 10px 12px; }
    .nut-value { font-size: 18px; font-weight: 500; color: var(--text-primary); }
    .nut-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* Food groups */
    .food-groups { margin-bottom: 1.25rem; }
    .food-group-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .fg-label { font-size: 13px; color: var(--text-secondary); width: 90px; flex-shrink: 0; }
    .fg-bar-track { flex: 1; height: 8px; background: var(--surface-1); border-radius: 4px; overflow: hidden; }
    .fg-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .fg-score-label { font-size: 12px; color: var(--text-muted); width: 30px; text-align: right; flex-shrink: 0; }
    .fg-missing { font-size: 12px; color: #a32d2d; font-weight: 500; }

    /* Supplements */
    .supplements { background: #f0f8ff; border: 0.5px solid #b5d4f4; border-radius: var(--radius); padding: 10px 14px; margin-bottom: 1.25rem; }
    .supp-title { font-size: 13px; font-weight: 500; color: #185fa5; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .supp-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .supp-pill { background: #fff; border: 0.5px solid #b5d4f4; border-radius: 20px; padding: 3px 10px; font-size: 12px; color: #185fa5; }

    /* Light option */
    .light-toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 1.5rem; background: var(--surface-0); border-top: 0.5px solid var(--border); }
    .light-label { font-size: 14px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
    .light-badge { background: #e6f1fb; color: #185fa5; border: 0.5px solid #b5d4f4; border-radius: 4px; padding: 2px 7px; font-size: 11px; font-weight: 500; }

    /* Comparison */
    .comparison { padding: 1.25rem 1.5rem; background: var(--surface-0); border-top: 0.5px solid var(--border); }
    .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .compare-col { }
    .compare-header { font-size: 13px; font-weight: 500; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 6px; }
    .compare-header.regular { color: var(--text-primary); }
    .compare-header.light { color: #185fa5; }
    .compare-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
    .compare-row:last-child { border-bottom: none; }
    .compare-key { color: var(--text-secondary); }
    .compare-val { font-weight: 500; }
    .compare-val.lower { color: #185fa5; }
    .compare-val.higher { color: #a32d2d; }
    .light-changes { margin-top: 10px; }
    .light-change-item { font-size: 12px; color: var(--text-secondary); padding: 3px 0; display: flex; align-items: flex-start; gap: 6px; }
    .light-change-item::before { content: "•"; color: #185fa5; flex-shrink: 0; margin-top: 1px; }

    /* Error */
    .error-msg { background: var(--danger-bg); border: 0.5px solid var(--danger-border); border-radius: 10px; padding: 1rem; color: var(--danger); font-size: 14px; margin-bottom: 1rem; }

    @media (max-width: 600px) {
      .compare-grid { grid-template-columns: 1fr; }
      .nutrition-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const CUISINE_BACKGROUNDS = {
  Any: "linear-gradient(135deg, rgba(240, 228, 200, 0.7), rgba(248, 247, 244, 0.95))",
  Italian: "linear-gradient(135deg, rgba(255, 236, 208, 0.72), rgba(248, 247, 244, 0.95)), url('https://images.unsplash.com/photo-1516100882582-96c3a05fe590?auto=format&fit=crop&w=1800&q=80')",
  Japanese: "linear-gradient(135deg, rgba(255, 241, 220, 0.72), rgba(248, 247, 244, 0.95)), url('https://images.unsplash.com/photo-1553621042-f6e147245754?auto=format&fit=crop&w=1800&q=80')",
  Chinese: "linear-gradient(135deg, rgba(255, 232, 208, 0.72), rgba(248, 247, 244, 0.95)), url('https://images.unsplash.com/photo-1552566626-52f8b828add9?auto=format&fit=crop&w=1800&q=80')",
  Mexican: "linear-gradient(135deg, rgba(255, 232, 208, 0.72), rgba(248, 247, 244, 0.95)), url('https://images.unsplash.com/photo-1565299585323-38d6b0865b47?auto=format&fit=crop&w=1800&q=80')",
  Indian: "linear-gradient(135deg, rgba(248, 232, 200, 0.72), rgba(248, 247, 244, 0.95)), url('https://images.unsplash.com/photo-1585937421612-70a008356fbe?auto=format&fit=crop&w=1800&q=80')",
  Mediterranean: "linear-gradient(135deg, rgba(229, 244, 223, 0.72), rgba(248, 247, 244, 0.95)), url('https://images.unsplash.com/photo-1547592180-85f173990554?auto=format&fit=crop&w=1800&q=80')",
  Thai: "linear-gradient(135deg, rgba(255, 236, 204, 0.72), rgba(248, 247, 244, 0.95)), url('https://images.unsplash.com/photo-1559314809-0d155014e29e?auto=format&fit=crop&w=1800&q=80')",
  American: "linear-gradient(135deg, rgba(248, 233, 208, 0.72), rgba(248, 247, 244, 0.95)), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=1800&q=80')",
  French: "linear-gradient(135deg, rgba(250, 239, 220, 0.72), rgba(248, 247, 244, 0.95)), url('https://images.unsplash.com/photo-1473093295043-cdd812d0e601?auto=format&fit=crop&w=1800&q=80')",
  Korean: "linear-gradient(135deg, rgba(255, 236, 208, 0.72), rgba(248, 247, 244, 0.95)), url('https://images.unsplash.com/photo-1617093727343-374698b1b08d?auto=format&fit=crop&w=1800&q=80')",
  "Middle Eastern": "linear-gradient(135deg, rgba(247, 235, 208, 0.72), rgba(248, 247, 244, 0.95)), url('https://images.unsplash.com/photo-1547592180-85f173990554?auto=format&fit=crop&w=1800&q=80')",
  Greek: "linear-gradient(135deg, rgba(245, 239, 208, 0.72), rgba(248, 247, 244, 0.95)), url('https://images.unsplash.com/photo-1547592180-85f173990554?auto=format&fit=crop&w=1800&q=80')",
  Vietnamese: "linear-gradient(135deg, rgba(255, 236, 208, 0.72), rgba(248, 247, 244, 0.95)), url('https://images.unsplash.com/photo-1529042410759-befb1204b468?auto=format&fit=crop&w=1800&q=80')",
  Spanish: "linear-gradient(135deg, rgba(250, 238, 208, 0.72), rgba(248, 247, 244, 0.95)), url('https://images.unsplash.com/photo-1543340901-7b9f30f5b40d?auto=format&fit=crop&w=1800&q=80')"
};

const CUISINES = [
  "Any", "Italian", "Japanese", "Chinese", "Mexican", "Indian",
  "Mediterranean", "Thai", "American", "French", "Korean", "Middle Eastern",
  "Greek", "Vietnamese", "Spanish"
];

const FOOD_GROUPS = ["Grains", "Protein", "Dairy", "Fruits", "Vegetables", "Fats"];

const FG_COLORS = {
  Grains: "#ef9f27",
  Protein: "#d85a30",
  Dairy: "#7f77dd",
  Fruits: "#1d9e75",
  Vegetables: "#639922",
  Fats: "#d4537e"
};

function TagInput({ tags, onChange }) {
  const [inputVal, setInputVal] = useState("");
  const [isListening, setIsListening] = useState(false);
  const [voiceStatus, setVoiceStatus] = useState("");
  const inputRef = useRef();
  const recognitionRef = useRef(null);
  const isListeningRef = useRef(false);
  const shouldKeepListeningRef = useRef(false);
  const voiceTimeoutRef = useRef(null);
  const voiceRestartRef = useRef(null);
  const tagsRef = useRef(tags);

  useEffect(() => {
    tagsRef.current = tags;
  }, [tags]);

  const clearVoiceTimers = () => {
    if (voiceTimeoutRef.current) {
      clearTimeout(voiceTimeoutRef.current);
      voiceTimeoutRef.current = null;
    }
    if (voiceRestartRef.current) {
      clearTimeout(voiceRestartRef.current);
      voiceRestartRef.current = null;
    }
  };

  const stopListening = () => {
    shouldKeepListeningRef.current = false;
    clearVoiceTimers();
    isListeningRef.current = false;
    setIsListening(false);
    setVoiceStatus("");
    if (recognitionRef.current) {
      try {
        recognitionRef.current.stop();
      } catch (e) {}
    }
  };

  const extendListeningWindow = () => {
    if (!shouldKeepListeningRef.current) return;
    clearVoiceTimers();
    voiceTimeoutRef.current = setTimeout(() => {
      if (!shouldKeepListeningRef.current) return;
      shouldKeepListeningRef.current = false;
      setIsListening(false);
      setVoiceStatus("Voice input paused after 5 seconds. Tap Voice to continue.");
      try {
        recognitionRef.current?.stop();
      } catch (e) {}
    }, 5000);
  };

  useEffect(() => {
    isListeningRef.current = isListening;
  }, [isListening]);

  const initRecognition = () => {
    if (recognitionRef.current) {
      return recognitionRef.current;
    }

    const hostname = window.location.hostname;
    const isLocalNetworkHost = /^(localhost|127\.0\.0\.1|::1|\[::1\]|192\.168\.|10\.|172\.(1[6-9]|2\d|3[0-1])\.)/.test(hostname);
    const isSecureContext = window.isSecureContext || isLocalNetworkHost;
    if (!isSecureContext) {
      setVoiceStatus("Voice input requires a secure connection. Please open this app from localhost or HTTPS.");
      return null;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      setVoiceStatus("Voice input is not supported in this browser. Please try the latest Chrome or Safari on a supported device.");
      return null;
    }

    const recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = "en-US";
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
      shouldKeepListeningRef.current = true;
      isListeningRef.current = true;
      setIsListening(true);
      setVoiceStatus("Listening for ingredients...");
      extendListeningWindow();
    };

    recognition.onresult = (event) => {
      let interimText = "";
      let finalText = "";

      for (let i = event.resultIndex; i < event.results.length; i += 1) {
        const result = event.results[i];
        const transcript = result[0].transcript.trim();
        if (result.isFinal) {
          finalText += `${finalText ? " " : ""}${transcript}`;
        } else {
          interimText += `${interimText ? " " : ""}${transcript}`;
        }
      }

      if (finalText) {
        const parts = finalText
          .split(/,|;| and |\n/i)
          .map((part) => part.trim().toLowerCase())
          .filter(Boolean);

        const newTags = parts.filter((part) => part && !tagsRef.current.includes(part));
        if (newTags.length) {
          onChange([...tagsRef.current, ...newTags]);
        }
        setInputVal("");
        setVoiceStatus("Ingredients added from voice input.");
        extendListeningWindow();
      } else if (interimText) {
        setInputVal(interimText);
        setVoiceStatus("Listening for ingredients...");
        extendListeningWindow();
      }
    };

    recognition.onend = () => {
      if (!shouldKeepListeningRef.current) {
        setIsListening(false);
        setVoiceStatus("");
        return;
      }

      setIsListening(true);
      setVoiceStatus("Listening for ingredients...");
      extendListeningWindow();
      voiceRestartRef.current = setTimeout(() => {
        if (shouldKeepListeningRef.current && recognitionRef.current) {
          try {
            recognitionRef.current.start();
          } catch (e) {}
        }
      }, 150);
    };

    recognition.onerror = (event) => {
      if (event.error === "not-allowed") {
        stopListening();
        setVoiceStatus("Microphone access was blocked. Please allow it in your browser settings and try again.");
      } else if (shouldKeepListeningRef.current && event.error !== "aborted") {
        setIsListening(true);
        setVoiceStatus("Listening for ingredients...");
        extendListeningWindow();
      } else {
        setIsListening(false);
        isListeningRef.current = false;
        setVoiceStatus(`Voice input error: ${event.error}`);
      }
    };

    recognitionRef.current = recognition;
    return recognition;
  };

  const addTag = (val) => {
    const trimmed = val.trim().toLowerCase();
    if (trimmed && !tags.includes(trimmed)) {
      onChange([...tags, trimmed]);
    }
    setInputVal("");
  };

  const handleKey = (e) => {
    if ((e.key === "Enter" || e.key === ",") && inputVal.trim()) {
      e.preventDefault();
      addTag(inputVal);
    } else if (e.key === "Backspace" && !inputVal && tags.length) {
      onChange(tags.slice(0, -1));
    }
  };

  const toggleVoiceInput = async () => {
    if (isListening) {
      stopListening();
      return;
    }

    const recognition = initRecognition();
    if (!recognition) {
      return;
    }

    try {
      if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        setVoiceStatus("Requesting microphone permission...");
        await navigator.mediaDevices.getUserMedia({ audio: true });
      }
      shouldKeepListeningRef.current = true;
      isListeningRef.current = true;
      setIsListening(true);
      setVoiceStatus("Listening for ingredients...");
      extendListeningWindow();
      recognition.start();
    } catch (e) {
      shouldKeepListeningRef.current = false;
      clearVoiceTimers();
      isListeningRef.current = false;
      setIsListening(false);
      setVoiceStatus("Microphone permission was blocked or unavailable. Please allow it in your browser settings and try again.");
    }
  };

  return (
    <div>
      <div className="tag-input-row">
        <div className="tags-container" onClick={() => inputRef.current?.focus()}>
          {tags.map(tag => (
            <span className="tag" key={tag}>
              {tag}
              <span className="tag-remove" onClick={e => { e.stopPropagation(); onChange(tags.filter(t => t !== tag)); }}>×</span>
            </span>
          ))}
          <input
            ref={inputRef}
            className="tag-input"
            placeholder={tags.length === 0 ? "Type an ingredient, press Enter or comma..." : "Add more..."}
            value={inputVal}
            onChange={e => setInputVal(e.target.value)}
            onKeyDown={handleKey}
            onBlur={() => inputVal.trim() && addTag(inputVal)}
          />
        </div>
        <button type="button" className={`voice-btn ${isListening ? "listening" : ""}`} onClick={toggleVoiceInput}>
          <i className={`ti ${isListening ? "ti-player-stop-filled" : "ti-microphone"}`} aria-hidden="true" />
          {isListening ? "Stop" : "Voice"}
        </button>
      </div>
      <div className="tag-hint">
        Press Enter or comma to add each ingredient
        {voiceStatus ? <span style={{ display: "block", marginTop: 4, color: isListening ? "var(--danger)" : "var(--text-muted)" }}>{voiceStatus}</span> : null}
      </div>
    </div>
  );
}

function Counter({ value, onChange, min = 0, max = 20 }) {
  return (
    <div className="serving-row">
      <button className="count-btn" onClick={() => onChange(Math.max(min, value - 1))}>−</button>
      <span className="count-display">{value}</span>
      <button className="count-btn" onClick={() => onChange(Math.min(max, value + 1))}>+</button>
    </div>
  );
}

function Toggle({ on, onToggle }) {
  return (
    <button className={`toggle ${on ? "on" : ""}`} onClick={onToggle} aria-pressed={on}>
      <div className="toggle-thumb" />
    </button>
  );
}

function FoodGroupBar({ group, score }) {
  const pct = Math.round(score * 100);
  const color = FG_COLORS[group];
  const isMissing = score < 0.25;
  return (
    <div className="food-group-row">
      <span className="fg-label">{group}</span>
      <div className="fg-bar-track">
        <div className="fg-bar-fill" style={{ width: `${pct}%`, background: color }} />
      </div>
      <span className="fg-score-label" style={{ color: isMissing ? "#a32d2d" : color }}>
        {pct}%
      </span>
    </div>
  );
}

function NutritionGrid({ nutrition }) {
  const items = [
    { label: "Calories", value: nutrition.calories, unit: "kcal" },
    { label: "Protein", value: nutrition.protein, unit: "g" },
    { label: "Carbs", value: nutrition.carbs, unit: "g" },
    { label: "Fat", value: nutrition.fat, unit: "g" },
    { label: "Fiber", value: nutrition.fiber, unit: "g" },
    { label: "Sodium", value: nutrition.sodium, unit: "mg" },
    { label: "Sugar", value: nutrition.sugar, unit: "g" },

  return (
    <div className="nutrition-grid">
      {items.map(({ label, value, unit }) => (
        <div className="nut-card" key={label}>
          <div className="nut-value">{value}<span style={{fontSize:11,fontWeight:400,color:"var(--text-muted)"}}>{unit}</span></div>

function ComparisonView({ regular, light }) {
  const keys = [
    { key: "calories", label: "Calories", unit: "kcal" },
    { key: "fat", label: "Fat", unit: "g" },
    { key: "sodium", label: "Sodium", unit: "mg" },
    { key: "protein", label: "Protein", unit: "g" },
    { key: "carbs", label: "Carbs", unit: "g" },
    { key: "fiber", label: "Fiber", unit: "g" },
  ];
  return (
    <div className="comparison">
      <div style={{fontSize:13, fontWeight:500, color:"var(--text-secondary)", marginBottom:12}}>Side-by-side comparison</div>
      <div className="compare-grid">
        <div className="compare-col">
          <div className="compare-header regular"><i className="ti ti-bowl-filled" aria-hidden="true" />Regular</div>
          {keys.map(({key, label, unit}) => (
            <div className="compare-row" key={key}>
              <span className="compare-key">{label}</span>
              <span className="compare-val">{regular[key]}{unit}</span>
            </div>
          ))}
        </div>
        <div className="compare-col">
          <div className="compare-header light"><i className="ti ti-leaf" aria-hidden="true" />Light version</div>
          {keys.map(({key, label, unit}) => {
            const diff = light.nutrition[key] - regular[key];
            const cls = diff < 0 ? "lower" : diff > 0 ? "higher" : "";
            return (
              <div className="compare-row" key={key}>
                <span className="compare-key">{label}</span>
                <span className={`compare-val ${cls}`}>
                  {light.nutrition[key]}{unit}
                  {diff !== 0 && <span style={{fontSize:11,marginLeft:4,opacity:0.8}}>{diff > 0 ? "+" : ""}{diff}</span>}
                </span>
              </div>
            );
          })}
        </div>
      </div>
      {light.changes && light.changes.length > 0 && (
        <div className="light-changes">
          <div style={{fontSize:13, fontWeight:500, color:"#185fa5", marginTop:14, marginBottom:6}}>What changes in the light version</div>
          {light.changes.map((change, i) => (
            <div className="light-change-item" key={i}>{change}</div>
          ))}
        </div>
      )}
    </div>
  );
}

function MealCard({ meal }) {
  const [showLight, setShowLight] = useState(false);
  const missingGroups = FOOD_GROUPS.filter(g => (meal.foodGroups[g] || 0) < 0.25);
  const prepTime = meal.prepTimeMinutes || 0;
  const cookTime = meal.cookTimeMinutes || 0;
  const totalTime = prepTime + cookTime;
  const difficulty = meal.complexity || meal.difficulty || "Medium";
  const cookwareCount = Array.isArray(meal.cookwareNeeded) ? meal.cookwareNeeded.length : 0;

  return (
    <div className="meal-card">
      <div className="meal-header">
        <div className="meal-title-row">
          <div className="meal-name">{meal.name}</div>
          <span className="cuisine-badge">{meal.cuisine}</span>
        </div>
        <div className="meal-desc">{meal.description}</div>
      </div>
      <div className="meal-body">
        <div className="detail-row">
          <span className="detail-pill"><i className="ti ti-clock" aria-hidden="true" />Prep {prepTime} min</span>
          <span className="detail-pill"><i className="ti ti-fire" aria-hidden="true" />Cook {cookTime} min</span>
          <span className="detail-pill"><i className="ti ti-stopwatch" aria-hidden="true" />Total {totalTime} min</span>
          <span className="detail-pill"><i className="ti ti-chart-bar" aria-hidden="true" />{difficulty}</span>
          <span className="detail-pill"><i className="ti ti-pot" aria-hidden="true" />{cookwareCount} cookware</span>
        </div>

        <div className="recipe-section">
          <div className="section-label">Exact ingredients</div>
          <ul className="ingredient-list">
            {(meal.ingredients || []).map((ingredient, index) => (
              <li key={index}>{ingredient}</li>
            ))}
          </ul>
        </div>

        <div className="recipe-section">
          <div className="section-label">Recipe</div>
          <ol className="step-list">
            {(meal.recipeSteps || []).map((step, index) => (
              <li key={index}>{step}</li>
            ))}
          </ol>
        </div>

        <div className="section-label">Nutrition per serving</div>
        <NutritionGrid nutrition={meal.nutrition} />

        <div className="section-label">Food group coverage</div>
        <div className="food-groups">
          {FOOD_GROUPS.map(g => (
            <FoodGroupBar key={g} group={g} score={meal.foodGroups[g] || 0} />
          ))}
        </div>

        {missingGroups.length > 0 && meal.supplements && (
          <div className="supplements">
            <div className="supp-title">
              <i className="ti ti-plus-health" aria-hidden="true" />
              Bridge the gap — suggested supplements
            </div>
            <div className="supp-list">
              {(meal.supplements || []).map((s, i) => (
                <span className="supp-pill" key={i}>{s}</span>
              ))}
            </div>
          </div>
        )}
      </div>

      {meal.light && (
        <>
          <div className="light-toggle-row">
            <span className="light-label">
              <i className="ti ti-leaf" aria-hidden="true" style={{color:"#185fa5"}} />
              Show light version
              <span className="light-badge">lower fat &amp; sodium</span>
            </span>
            <Toggle on={showLight} onToggle={() => setShowLight(v => !v)} />
          </div>
          {showLight && (
            <ComparisonView regular={meal.nutrition} light={meal.light} />
          )}
        </>
      )}
    </div>
  );
}

function App() {
  const [apiKey, setApiKey] = useState(() => {
    try {
      return localStorage.getItem("ms_api_key") || "";
    } catch {
      return "";
    }
  });
  const [rememberKey, setRememberKey] = useState(() => {
    try {
      return localStorage.getItem("ms_remember_api_key") !== "false";
    } catch {
      return true;
    }
  });
  const [ingredients, setIngredients] = useState(() => {
    try {
      const saved = localStorage.getItem("ms_inventory");
      return saved ? JSON.parse(saved) : [];
    } catch {
      return [];
    }
  });
  const [cuisine, setCuisine] = useState("Any");
  const [adults, setAdults] = useState(2);
  const [children, setChildren] = useState(0);
  const [wantLeftovers, setWantLeftovers] = useState(false);
  const [leftoverAdults, setLeftoverAdults] = useState(2);
  const [leftoverChildren, setLeftoverChildren] = useState(0);
  const [loading, setLoading] = useState(false);
  const [results, setResults] = useState(null);
  const [error, setError] = useState(null);
  const [mealFilters, setMealFilters] = useState({ time: "any", difficulty: "any", cookware: "any" });

  const saveKey = (k, shouldRemember = rememberKey) => {
    setApiKey(k);
    try {
      if (shouldRemember && k.trim()) {
        localStorage.setItem("ms_api_key", k);
      } else {
        localStorage.removeItem("ms_api_key");
      }
      localStorage.setItem("ms_remember_api_key", shouldRemember ? "true" : "false");
    } catch (e) {
      console.warn("Could not save API key", e);
    }
  };

  const clearSavedKey = () => {
    saveKey("", false);
  };

  const updateInventory = (nextIngredients) => {
    setIngredients(nextIngredients);
    try {
      if (nextIngredients.length > 0) {
        localStorage.setItem("ms_inventory", JSON.stringify(nextIngredients));
      } else {
        localStorage.removeItem("ms_inventory");
      }
    } catch (e) {
      console.warn("Could not save inventory", e);
    }
  };

  const clearInventory = () => {
    updateInventory([]);
  };

  useEffect(() => {
    try {
      if (ingredients.length > 0) {
        localStorage.setItem("ms_inventory", JSON.stringify(ingredients));
      } else {
        localStorage.removeItem("ms_inventory");
      }
    } catch (e) {
      console.warn("Could not save inventory", e);
    }
  }, [ingredients]);

  const totalDinnerServings = adults + children;
  const leftoverServings = leftoverAdults + leftoverChildren;
  const totalServings = totalDinnerServings + (wantLeftovers ? leftoverServings : 0);
  const cuisineBackgroundStyle = {
    backgroundImage: CUISINE_BACKGROUNDS[cuisine] || CUISINE_BACKGROUNDS.Any
  };
  const selectedCuisineLabel = cuisine && cuisine !== "Any" ? cuisine : "Any cuisine";
  const filteredMeals = (results?.meals || []).filter((meal) => {
    const totalTime = (meal.prepTimeMinutes || 0) + (meal.cookTimeMinutes || 0);
    const difficulty = meal.complexity || meal.difficulty || "Medium";
    const cookwareCount = Array.isArray(meal.cookwareNeeded) ? meal.cookwareNeeded.length : 0;

    if (mealFilters.time === "under30" && totalTime > 30) return false;
    if (mealFilters.time === "under45" && totalTime > 45) return false;
    if (mealFilters.time === "over45" && totalTime <= 45) return false;

    if (mealFilters.difficulty !== "any" && difficulty.toLowerCase() !== mealFilters.difficulty.toLowerCase()) return false;
    if (mealFilters.cookware === "oneTwo" && cookwareCount > 2) return false;
    if (mealFilters.cookware === "threePlus" && cookwareCount < 3) return false;

    return true;
  });

  const buildPrompt = () => {
    const ingredientList = ingredients.join(", ");
    const servingDesc = `${adults} adult${adults !== 1 ? "s" : ""}${children > 0 ? ` and ${children} child${children !== 1 ? "ren" : ""}` : ""}`;
    const leftoverDesc = wantLeftovers
      ? ` Plus ${leftoverAdults} adult${leftoverAdults !== 1 ? "s" : ""}${leftoverChildren > 0 ? ` and ${leftoverChildren} child${leftoverChildren !== 1 ? "ren" : ""}` : ""} for lunch leftovers tomorrow.`
      : "";

    return `You are a culinary expert and nutritionist. A user wants meal suggestions based on their available ingredients.

Ingredients available: ${ingredientList || "not specified — suggest versatile meals"}
Preferred cuisine: ${cuisine}
Servings needed: ${servingDesc} for dinner tonight.${leftoverDesc}
Total servings to cook for: ${totalServings}

Instructions:
1. Check if the available ingredients align with ${cuisine} cuisine. If they don't match well, note the mismatch and suggest what cuisines fit the ingredients better.
2. Suggest exactly 3 meal ideas. Adjust quantities for ${totalServings} total servings.
3. For each meal, provide:
   - Nutritional values PER SERVING (calories, protein g, carbs g, fat g, fiber g, sodium mg, sugar g) — all as plain numbers
   - Food group coverage as a decimal 0–1 (0=none, 1=excellent): Grains, Protein, Dairy, Fruits, Vegetables, Fats
   - Exact ingredients as a list of strings with amounts and simple descriptions, such as "2 tbsp olive oil"
   - A recipe as an array of step strings, written clearly and briefly
   - Prep time in minutes, cook time in minutes, complexity as one of "Easy", "Medium", or "Hard", and cookwareNeeded as an array of simple items such as ["skillet", "pot"]
   - If any food group is below 0.25, suggest 3–5 simple supplement foods to bridge the gap
   - A "light" version that meaningfully reduces fat or sodium without sacrificing flavor — include its nutrition and a list of specific changes made

Respond ONLY with valid JSON in this exact structure (no markdown, no extra text):
{
  "cuisineMismatch": false,
  "mismatchExplanation": "",
  "suggestedCuisines": [],
  "meals": [
    {
      "name": "Meal Name",
      "cuisine": "Cuisine Type",
      "description": "2-sentence appetizing description",
      "nutrition": {
        "calories": 450,
        "protein": 32,
        "carbs": 48,
        "fat": 14,
        "fiber": 6,
        "sodium": 680,
        "sugar": 8
      },
      "foodGroups": {
        "Grains": 0.8,
        "Protein": 0.9,
        "Dairy": 0.1,
        "Fruits": 0.0,
        "Vegetables": 0.7,
        "Fats": 0.5
      },
      "ingredients": ["2 tbsp olive oil", "1 lb chicken thighs", "2 cups cooked rice"],
      "recipeSteps": ["Heat the oil in a skillet.", "Cook the chicken until browned."],
      "prepTimeMinutes": 15,
      "cookTimeMinutes": 20,
      "complexity": "Easy",
      "cookwareNeeded": ["skillet", "mixing bowl"],
      "supplements": ["Side salad with leafy greens", "Glass of milk or yogurt", "Fresh fruit for dessert"],
      "light": {
        "description": "Brief description of the lighter take",
        "changes": ["Use olive oil spray instead of butter", "Reduce cheese to 1/4 amount", "Increase vegetables by 50%"],
        "nutrition": {
          "calories": 320,
          "protein": 30,
          "carbs": 45,
          "fat": 7,
          "fiber": 8,
          "sodium": 420,
          "sugar": 7
        }
      }
    }
  ]
}`;
  };

  const generate = async () => {
    if (!apiKey.trim()) {
      setError("Please enter your Anthropic API key to get meal suggestions.");
      return;
    }
    if (ingredients.length === 0) {
      setError("Please add at least one ingredient before generating suggestions.");
      return;
    }

    setError(null);
    setLoading(true);
    setResults(null);

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-opus-4-8",
          max_tokens: 4096,
          messages: [{ role: "user", content: buildPrompt() }]
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || `API error ${response.status}`);
      }

      const data = await response.json();
      const text = data.content?.[0]?.text || "";
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error("Could not parse response. Please try again.");
      const parsed = JSON.parse(jsonMatch[0]);
      setResults(parsed);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="page-shell">
      <div className="cuisine-background" style={cuisineBackgroundStyle} aria-hidden="true" />
      <div className="cuisine-badge">{selectedCuisineLabel}</div>
      <div className="app">
        <div className="header">
        <h1><i className="ti ti-chef-hat" aria-hidden="true" style={{marginRight:8}} />Meal Suggester</h1>
        <p>Tell us what you have, and we'll tell you what to cook.</p>
      </div>

      <div className="api-key-section">
        <i className="ti ti-key" aria-hidden="true" style={{color:"var(--warning-text)",fontSize:20,flexShrink:0}} />
        <span className="api-key-label">API Key</span>
        <input
          type="password"
          placeholder="sk-ant-..."
          value={apiKey}
          onChange={e => saveKey(e.target.value, rememberKey)}
        />
      </div>

      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", gap:12, marginBottom:"1.5rem", flexWrap:"wrap"}}>
        <label style={{display:"flex", alignItems:"center", gap:8, fontSize:13, color:"var(--text-secondary)"}}>
          <input
            type="checkbox"
            checked={rememberKey}
            onChange={e => {
              const checked = e.target.checked;
              setRememberKey(checked);
              saveKey(apiKey, checked);
            }}
          />
          Remember this key on this device
        </label>
        {apiKey && (
          <button
            type="button"
            onClick={clearSavedKey}
            style={{background:"transparent", border:"0.5px solid var(--border-strong)", borderRadius:6, padding:"6px 10px", fontSize:13, color:"var(--text-secondary)", cursor:"pointer"}}
          >
            Clear saved key
          </button>
        )}
      </div>

      <div className="card">
        <div className="card-title" style={{justifyContent:"space-between", alignItems:"center"}}>
          <span style={{display:"flex", alignItems:"center", gap:8}}>
            <i className="ti ti-carrot" aria-hidden="true" />Ingredients I have
          </span>
          {ingredients.length > 0 && (
            <button
              type="button"
              onClick={clearInventory}
              style={{background:"transparent", border:"0.5px solid var(--border-strong)", borderRadius:6, padding:"6px 10px", fontSize:13, color:"var(--text-secondary)", cursor:"pointer"}}
            >
              Clear inventory
            </button>
          )}
        </div>
        <TagInput tags={ingredients} onChange={updateInventory} />
      </div>

      <div className="card">
        <div className="card-title"><i className="ti ti-world" aria-hidden="true" />Cuisine preference</div>
        <div className="cuisine-grid">
          {CUISINES.map(c => (
            <button key={c} className={`cuisine-btn${cuisine === c ? " selected" : ""}`} onClick={() => setCuisine(c)}>
              {c}
            </button>
          ))}
        </div>
      </div>

      <div className="card">
        <div className="card-title"><i className="ti ti-users" aria-hidden="true" />Serving size</div>
        <div className="servings-grid">
          <div className="serving-item">
            <span className="serving-label">Adults (dinner)</span>
            <Counter value={adults} onChange={setAdults} min={1} />
          </div>
          <div className="serving-item">
            <span className="serving-label">Children (dinner)</span>
            <Counter value={children} onChange={setChildren} />
          </div>
        </div>

        <div className="leftovers-toggle" style={{marginTop:16}}>
          <Toggle on={wantLeftovers} onToggle={() => setWantLeftovers(v => !v)} />
          <span style={{fontSize:14, color:"var(--text-secondary)"}}>Make enough for lunch leftovers tomorrow</span>
        </div>

        {wantLeftovers && (
          <div className="leftover-inputs">
            <span style={{fontSize:13, color:"var(--text-secondary)", marginRight:8}}>Leftover portions:</span>
            <div className="serving-item">
              <span className="serving-label" style={{fontSize:12}}>Adults</span>
              <Counter value={leftoverAdults} onChange={setLeftoverAdults} min={0} />
            </div>
            <div style={{width:16}} />
            <div className="serving-item">
              <span className="serving-label" style={{fontSize:12}}>Children</span>
              <Counter value={leftoverChildren} onChange={setLeftoverChildren} min={0} />
            </div>
          </div>
        )}

        <div style={{marginTop:12, padding:"8px 10px", background:"var(--surface-0)", borderRadius:"var(--radius)", fontSize:13, color:"var(--text-muted)"}}>
          <i className="ti ti-bowl-filled" aria-hidden="true" style={{marginRight:6}} />
          Cooking for <strong style={{color:"var(--text-secondary)"}}>{totalServings} total serving{totalServings !== 1 ? "s" : ""}</strong>
          {wantLeftovers && ` (${totalDinnerServings} dinner + ${leftoverServings} leftovers)`}
        </div>
      </div>

      {error && <div className="error-msg"><i className="ti ti-alert-circle" aria-hidden="true" style={{marginRight:8}} />{error}</div>}

      <button className="generate-btn" onClick={generate} disabled={loading}>
        {loading ? (
          <><div className="spinner" style={{width:20,height:20,borderWidth:2,marginBottom:0}} />Finding meal ideas...</>
        ) : (
          <><i className="ti ti-sparkles" aria-hidden="true" />Suggest meals</>
        )}
      </button>

      {loading && (
        <div className="loading">
          <div className="spinner" />
          <div>Thinking about your ingredients...</div>
        </div>
      )}

      {results && (
        <div style={{marginTop:"2rem"}}>
          {results.cuisineMismatch && (
            <div className="mismatch-banner">
              <div className="banner-title">
                <i className="ti ti-alert-triangle" aria-hidden="true" />
                Cuisine mismatch
              </div>
              <p>{results.mismatchExplanation}</p>
              {results.suggestedCuisines?.length > 0 && (
                <div style={{marginTop:8, display:"flex", gap:6, flexWrap:"wrap"}}>
                  <span style={{fontSize:12, color:"var(--warning-text)", marginRight:4}}>Better fits:</span>
                  {results.suggestedCuisines.map(c => (
                    <span key={c} style={{background:"#fff8ec", border:"0.5px solid var(--warning-border)", borderRadius:6, padding:"2px 8px", fontSize:12, color:"var(--warning-text)", fontWeight:500}}>{c}</span>
                  ))}
                </div>
              )}
            </div>
          )}

          <div style={{marginBottom:16, display:"flex", alignItems:"center", gap:8, flexWrap:"wrap"}}>
            <span style={{fontSize:16, fontWeight:500}}>Your meal ideas</span>
            <span style={{fontSize:13, color:"var(--text-muted)"}}>— nutrition shown per serving</span>
          </div>

          <div className="filters-bar">
            <div className="filter-group">
              <label htmlFor="time-filter">Time</label>
              <select id="time-filter" value={mealFilters.time} onChange={(e) => setMealFilters(v => ({ ...v, time: e.target.value }))}>
                <option value="any">Any time</option>
                <option value="under30">Under 30 min</option>
                <option value="under45">Under 45 min</option>
                <option value="over45">45+ min</option>
              </select>
            </div>
            <div className="filter-group">
              <label htmlFor="difficulty-filter">Difficulty</label>
              <select id="difficulty-filter" value={mealFilters.difficulty} onChange={(e) => setMealFilters(v => ({ ...v, difficulty: e.target.value }))}>
                <option value="any">Any level</option>
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
              </select>
            </div>
            <div className="filter-group">
              <label htmlFor="cookware-filter">Cookware</label>
              <select id="cookware-filter" value={mealFilters.cookware} onChange={(e) => setMealFilters(v => ({ ...v, cookware: e.target.value }))}>
                <option value="any">Any</option>
                <option value="oneTwo">1–2 pieces</option>
                <option value="threePlus">3+ pieces</option>
              </select>
            </div>
          </div>

          <div className="filter-summary">
            Showing {filteredMeals.length} of {results.meals?.length || 0} meal{(results.meals?.length || 0) === 1 ? "" : "s"}
          </div>

          {filteredMeals.length === 0 ? (
            <div className="empty-state">No meal ideas match those filters. Try broadening the criteria.</div>
          ) : (
            <div className="meals-grid">
              {filteredMeals.map((meal, i) => (
                <MealCard key={i} meal={meal} />
              ))}
            </div>
          )}
        </div>
      )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
